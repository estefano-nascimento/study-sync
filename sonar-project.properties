sonar.projectKey=estefano-nascimento_study-sync
sonar.organization=estefano-nascimento

# Sources
sonar.sources=lib,store,components,app
sonar.sourceEncoding=UTF-8

# Tests
sonar.tests=__tests__
sonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx

# Exclusions from analysis
sonar.exclusions=\
  node_modules/**,\
  android/**,\
  ios/**,\
  dist/**,\
  build/**,\
  .expo/**,\
  coverage/**,\
  __mocks__/**,\
  assets/**

# Exclusions from coverage tracking (files that don't need unit tests)
sonar.coverage.exclusions=\
  app/**

# Coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info
